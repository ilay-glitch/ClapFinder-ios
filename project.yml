name: ClapFinder

options:
  bundleIdPrefix: com.appcentral
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  createIntermediateGroups: true

packages:
  ClapFinderKit:
    path: ClapFinderKit

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  ClapFinder:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ClapFinder
        excludes:
          - Info.plist
          - ContentView.swift
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.appcentral.clapfinder
        INFOPLIST_FILE: ClapFinder/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - package: ClapFinderKit
        product: ClapFinderKitAds
      - package: ClapFinderKit
        product: ClapFinderKitAudio
      - package: ClapFinderKit
        product: ClapFinderKitData
      - package: ClapFinderKit
        product: ClapFinderKitDesign
      - package: ClapFinderKit
        product: ClapFinderKitLocalization
