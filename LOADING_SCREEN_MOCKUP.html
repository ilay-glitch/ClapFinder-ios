<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClapFinder — Loading Screen Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "SF Pro Rounded", "Helvetica Neue", sans-serif;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* iPhone frame */
  .phone {
    width: 393px;
    height: 852px;
    border-radius: 54px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 0 12px #0d0d14, 0 30px 80px rgba(0,0,0,.6);
  }

  /* ===== Night gradient in OUR brand colors ===== */
  .scene {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      #2b1055 0%,
      #4a1a6b 30%,
      #7b2d8b 55%,
      #c44b8c 78%,
      #f0735a 100%);
    overflow: hidden;
  }

  /* Stars */
  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 2.4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: .25; transform: scale(.8); }
    50% { opacity: 1; transform: scale(1.15); }
  }

  /* Moon */
  .moon {
    position: absolute;
    top: 86px; right: 56px;
    width: 84px; height: 84px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #fff8d6, #ffd96b);
    box-shadow: 0 0 50px 14px rgba(255, 217, 107, .35);
  }

  /* Soft hills */
  .hill {
    position: absolute;
    border-radius: 50% 50% 0 0;
  }
  .hill.back  { bottom: 195px; left: -120px; width: 460px; height: 190px; background: #5c2475; opacity: .8; }
  .hill.front { bottom: 165px; right: -140px; width: 520px; height: 210px; background: #471d62; }

  /* ===== Characters row ===== */
  .stage {
    position: absolute;
    bottom: 250px;
    width: 100%;
    display: flex;
    justify-content: space-around;
    align-items: flex-end;
    padding: 0 36px;
  }

  /* Clapping hands */
  .hands {
    font-size: 92px;
    line-height: 1;
    transform-origin: bottom center;
    animation: clap 1.1s ease-in-out infinite;
    filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
  }
  @keyframes clap {
    0%, 100% { transform: rotate(-6deg) scale(1); }
    50%      { transform: rotate(6deg) scale(1.12); }
  }
  .clap-spark {
    position: absolute;
    font-size: 26px;
    animation: spark 1.1s ease-in-out infinite;
    opacity: 0;
  }
  @keyframes spark {
    45% { opacity: 0; transform: translateY(0) scale(.6); }
    55% { opacity: 1; transform: translateY(-14px) scale(1.2); }
    80% { opacity: 0; transform: translateY(-26px) scale(.8); }
  }

  /* Dog + phone */
  .dog-wrap { position: relative; text-align: center; }
  .dog {
    font-size: 96px;
    line-height: 1;
    display: inline-block;
    animation: bounce 1.1s ease-in-out infinite;
    filter: drop-shadow(0 8px 18px rgba(0,0,0,.35));
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-16px); }
  }
  .phone-emoji {
    position: absolute;
    bottom: -10px; right: -22px;
    font-size: 44px;
    transform: rotate(12deg);
  }
  /* Sound waves from the phone */
  .wave {
    position: absolute;
    bottom: 8px; right: -30px;
    width: 26px; height: 26px;
    border: 3px solid #ffd96b;
    border-left-color: transparent;
    border-bottom-color: transparent;
    border-radius: 50%;
    transform: rotate(-15deg);
    animation: waveOut 1.1s ease-out infinite;
    opacity: 0;
  }
  .wave.w2 { animation-delay: .25s; }
  .wave.w3 { animation-delay: .5s; }
  @keyframes waveOut {
    0%   { opacity: .9; transform: rotate(-15deg) scale(.6); }
    100% { opacity: 0;  transform: rotate(-15deg) scale(2.1); }
  }

  /* ===== Title ===== */
  .title-block {
    position: absolute;
    top: 230px;
    width: 100%;
    text-align: center;
    padding: 0 28px;
  }
  .app-name {
    font-size: 44px;
    font-weight: 800;
    letter-spacing: -.5px;
    background: linear-gradient(90deg, #ffd96b, #ff9d6b, #ff6bb5);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    filter: drop-shadow(0 3px 10px rgba(0,0,0,.4));
  }
  .tagline {
    margin-top: 10px;
    font-size: 19px;
    font-weight: 600;
    color: rgba(255,255,255,.92);
    text-shadow: 0 2px 8px rgba(0,0,0,.35);
  }

  /* ===== Loading area ===== */
  .loading-block {
    position: absolute;
    bottom: 64px;
    width: 100%;
    padding: 0 44px;
    text-align: center;
  }
  .loading-label {
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 14px;
    text-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  .bar-track {
    width: 100%;
    height: 14px;
    background: rgba(255,255,255,.28);
    border-radius: 99px;
    overflow: hidden;
    backdrop-filter: blur(4px);
  }
  .bar-fill {
    height: 100%;
    width: 5%;
    border-radius: 99px;
    background: linear-gradient(90deg, #ffd96b, #ff8a5c, #ff5ca8);
    animation: load 6s ease-out forwards;
    box-shadow: 0 0 14px rgba(255, 138, 92, .8);
  }
  @keyframes load {
    0%   { width: 5%; }
    60%  { width: 64%; }
    100% { width: 96%; }
  }
  .ads-note {
    margin-top: 16px;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,.75);
  }

  /* paw prints decoration */
  .paw {
    position: absolute;
    font-size: 22px;
    opacity: .18;
    transform: rotate(-20deg);
  }
</style>
</head>
<body>

<div class="phone">
  <div class="scene">

    <!-- stars -->
    <div class="star" style="top: 60px; left: 40px; width: 4px; height: 4px;"></div>
    <div class="star" style="top: 110px; left: 120px; width: 3px; height: 3px; animation-delay: .4s;"></div>
    <div class="star" style="top: 70px; left: 220px; width: 5px; height: 5px; animation-delay: .9s;"></div>
    <div class="star" style="top: 150px; left: 300px; width: 3px; height: 3px; animation-delay: 1.3s;"></div>
    <div class="star" style="top: 190px; left: 70px; width: 4px; height: 4px; animation-delay: .7s;"></div>
    <div class="star" style="top: 45px; left: 320px; width: 3px; height: 3px; animation-delay: 1.7s;"></div>
    <div class="star" style="top: 210px; left: 350px; width: 4px; height: 4px; animation-delay: .2s;"></div>

    <div class="moon"></div>

    <div class="hill back"></div>
    <div class="hill front"></div>

    <!-- paw prints -->
    <div class="paw" style="bottom: 120px; left: 50px;">🐾</div>
    <div class="paw" style="bottom: 90px; left: 110px; transform: rotate(15deg);">🐾</div>
    <div class="paw" style="bottom: 140px; right: 80px; transform: rotate(40deg);">🐾</div>

    <!-- Title -->
    <div class="title-block">
      <div class="app-name">ClapFinder</div>
      <div class="tagline">Clap your hands — your phone answers! 🐶</div>
    </div>

    <!-- Characters -->
    <div class="stage">
      <div style="position: relative;">
        <div class="hands">👏</div>
        <div class="clap-spark" style="top: -8px; left: 8px;">✨</div>
        <div class="clap-spark" style="top: -4px; right: 4px; animation-delay: .2s;">✨</div>
      </div>
      <div class="dog-wrap">
        <div class="dog">🐶</div>
        <div class="phone-emoji">📱</div>
        <div class="wave"></div>
        <div class="wave w2"></div>
        <div class="wave w3"></div>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading-block">
      <div class="loading-label" id="pct">Loading 5%…</div>
      <div class="bar-track"><div class="bar-fill" id="bar"></div></div>
      <div class="ads-note">This action can contain ads</div>
    </div>

  </div>
</div>

<script>
  // Sync the percentage label with the bar animation
  const label = document.getElementById('pct');
  const start = Date.now();
  const dur = 6000;
  const tick = setInterval(() => {
    const t = Math.min((Date.now() - start) / dur, 1);
    // ease-out curve matching the CSS keyframes roughly
    const pct = Math.round(5 + 91 * (1 - Math.pow(1 - t, 2)));
    label.textContent = `Loading ${pct}%…`;
    if (t >= 1) clearInterval(tick);
  }, 120);
</script>

</body>
</html>
