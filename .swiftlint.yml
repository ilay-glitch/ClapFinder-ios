strict: true

excluded:
  - ClapFinderKit/.build
  - ClapFinderKit/Tests
  - ClapFinder/Preview Content

opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - sorted_imports
  - unavailable_function

disabled_rules:
  - trailing_whitespace

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 400
  error: 600

function_body_length:
  warning: 50
  error: 100
